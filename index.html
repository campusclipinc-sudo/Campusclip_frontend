<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon - Using public folder for direct access -->
  <!-- Note: Browser tabs display favicons at fixed sizes (16x16 or 32x32), we cannot make them larger -->
  <!-- Using absolute path to ensure it loads correctly -->
  <link rel="icon" type="image/png" sizes="36x36" href="/favicon.png?v=2" />
  <link rel="icon" type="image/png" sizes="18x18" href="/favicon.png?v=2" />
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <!-- Fallback shortcut icon -->
  <link rel="shortcut icon" type="image/png" href="/favicon.png?v=2" />
  <!-- Apple Touch Icon for iOS devices (appears larger on iOS home screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- Inter font (reference uses a clean geometric sans similar to Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>CampusClip</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
